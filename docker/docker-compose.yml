version: "3.8"

services:
  pve-ups-manager:
    build: .
    container_name: pve-ups-manager
    ports:
      - "13456:13456"
    volumes:
      - /etc/nut:/etc/nut:ro
      - /etc/apcupsd:/etc/apcupsd:ro
      - /var/log/pve-ups:/var/log
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
